version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    image: laranews-app
    container_name: laranews_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      PHP_OPCACHE_ENABLE: "1"
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laranews

  nginx:
    image: nginx:1.25-alpine
    container_name: laranews_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - storage_data:/var/www/html/storage/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - laranews

  db:
    image: mysql:8.0
    container_name: laranews_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-laranews}
      MYSQL_USER: ${DB_USERNAME:-laranews}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/laranews.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laranews

  redis:
    image: redis:7-alpine
    container_name: laranews_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laranews

  worker:
    image: laranews-app
    container_name: laranews_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=90 --queue=default,notifications,emails
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      - app
      - db
      - redis
    networks:
      - laranews

  scheduler:
    image: laranews-app
    container_name: laranews_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php /var/www/html/artisan schedule:run --no-interaction --no-ansi 2>&1;
        sleep 60;
      done"
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      - app
      - db
      - redis
    networks:
      - laranews

volumes:
  db_data:
  redis_data:
  storage_data:
  logs_data:

networks:
  laranews:
    driver: bridge
